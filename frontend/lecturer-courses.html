<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses - Geo-Attendance System</title>
    <script src="tailwindcss.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navigation Bar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center mr-3">
                            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0v7"></path>
                            </svg>
                        </div>
                        <span class="font-bold text-xl text-gray-900">Geo-Attendance</span>
                    </div>
                    <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                        <a href="lecturer-dashboard.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            Dashboard
                        </a>
                        <a href="lecturer-courses.html" class="border-blue-500 text-gray-900 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            My Courses
                        </a>
                        <a href="lecturer-reports.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            Reports
                        </a>
                    </div>
                </div>
                <div class="flex items-center">
                    <div class="ml-3 relative flex items-center space-x-4">
                        <span id="user-name" class="text-sm font-medium text-gray-700">Loading...</span>
                        <button id="logout-btn" class="text-sm text-red-600 hover:text-red-800 font-medium">
                            Sign out
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        
        <!-- Page Header -->
        <div class="md:flex md:items-center md:justify-between mb-8">
            <div class="flex-1 min-w-0">
                <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:text-3xl sm:truncate">
                    My Courses
                </h2>
                <p class="mt-1 text-sm text-gray-500">Manage the courses you are assigned to teach.</p>
            </div>
            <div class="mt-4 flex md:mt-0 md:ml-4">
                <a href="lecturer-add-course.html" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    <svg class="-ml-1 mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    Add Course
                </a>
            </div>
        </div>

        <!-- Courses Grid -->
        <div id="courses-loading" class="p-8 text-center">
            <svg class="animate-spin mx-auto h-8 w-8 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="mt-2 text-sm text-gray-500">Loading courses...</p>
        </div>

        <div id="courses-empty" class="hidden bg-white shadow overflow-hidden sm:rounded-lg p-12 text-center">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
            <h3 class="mt-2 text-sm font-medium text-gray-900">No courses found</h3>
            <p class="mt-1 text-sm text-gray-500">You are not assigned to any courses yet.</p>
        </div>

        <div id="courses-grid" class="hidden grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
            <!-- Course cards will be populated here -->
        </div>
    </main>

    <script>
        const API_BASE_URL = 'http://localhost:8000';

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('access_token');
            
            if (!token || token === 'undefined' || token === 'null') {
                window.location.href = 'lecturer-login.html';
                return;
            }

            try {
                const base64Url = token.split('.')[1];
                if (!base64Url) throw new Error('Invalid token format');
                
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                
                const payload = JSON.parse(jsonPayload);
                const userId = payload.user_id;

                await fetchUserProfile(userId, token);
                await fetchCourses(token);

            } catch (error) {
                console.error('Error initializing courses page:', error);
                localStorage.removeItem('access_token');
                localStorage.removeItem('refresh_token');
                window.location.href = 'lecturer-login.html';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = 'lecturer-login.html';
        });

        async function fetchUserProfile(userId, token) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/users/${userId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('user-name').textContent = `${data.first_name} ${data.last_name}`;
                }
            } catch (error) {
                console.error('Failed to fetch profile:', error);
            }
        }

        async function fetchCourses(token) {
            const loadingState = document.getElementById('courses-loading');
            const emptyState = document.getElementById('courses-empty');
            const grid = document.getElementById('courses-grid');

            try {
                const response = await fetch(`${API_BASE_URL}/api/academic-structure/v1/courses/`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    const courses = data.results || data;

                    loadingState.classList.add('hidden');

                    if (!courses || courses.length === 0) {
                        emptyState.classList.remove('hidden');
                    } else {
                        grid.innerHTML = '';
                        courses.forEach(course => {
                            const card = `
                                <div class="bg-white overflow-hidden shadow rounded-lg divide-y divide-gray-200">
                                    <div class="px-4 py-5 sm:px-6">
                                        <h3 class="text-lg leading-6 font-medium text-gray-900">${course.name || 'Course ' + course.id}</h3>
                                        <p class="mt-1 text-sm text-gray-500">Code: ${course.code || 'N/A'}</p>
                                    </div>
                                    <div class="px-4 py-4 sm:px-6">
                                        <p class="text-sm text-gray-700">${course.description || 'No description available.'}</p>
                                    </div>
                                    <div class="px-4 py-4 sm:px-6 bg-gray-50 flex justify-between items-center">
                                        <span class="text-xs font-medium text-gray-500 uppercase tracking-wider">Credits: ${course.credits || 'N/A'}</span>
                                        <button class="text-sm text-blue-600 hover:text-blue-900 font-medium">View Details</button>
                                    </div>
                                </div>
                            `;
                            grid.insertAdjacentHTML('beforeend', card);
                        });
                        grid.classList.remove('hidden');
                    }
                } else {
                    loadingState.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    emptyState.querySelector('h3').textContent = 'Error loading courses';
                    emptyState.querySelector('p').textContent = 'Server returned status ' + response.status;
                }
            } catch (error) {
                loadingState.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.querySelector('h3').textContent = 'Network Error';
                emptyState.querySelector('p').textContent = 'Could not connect to the server.';
            }
        }
    </script>
</body>
</html>
